<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);">
    <div class="card" style="width: 400px; text-align: center;">
        <h2 style="margin-bottom: 20px;">Welcome to CloudSpend</h2>
        {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <p style="color: #ff4b5c; font-size: 14px; margin-bottom: 10px;">{{ message }}</p>
    {% endfor %}
  {% endif %}
{% endwith %}
        <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" name="username" placeholder="Username" required class="glass-input">
            <input type="password" name="password" placeholder="Password" required class="glass-input">
            <button type="submit" class="btn-primary">Authenticate</button>
        </form>
    </div>
</body>
</html>
